services:
  postgres:
    image: postgres:17-alpine
    container_name: llmops-postgres
    environment:
      POSTGRES_DB: llmops_db
      POSTGRES_USER: llmops_user
      POSTGRES_PASSWORD: llmops_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U llmops_user -d llmops_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: llmops-backend
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg2://llmops_user:llmops_password@postgres:5432/llmops_db
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-env}
      PAGEINDEX_API_KEY: ${PAGEINDEX_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      LANGCHAIN_TRACING_V2: ${LANGCHAIN_TRACING_V2:-false}
      LANGCHAIN_ENDPOINT: ${LANGCHAIN_ENDPOINT:-https://api.smith.langchain.com}
      LANGCHAIN_API_KEY: ${LANGCHAIN_API_KEY:-}
      LANGCHAIN_PROJECT: ${LANGCHAIN_PROJECT:-llmops}
      CONFIG_PATH: /app/multi_doc_chat/config/config.yaml
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./faiss_index:/app/faiss_index
      - ./logs:/app/logs

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8000
    container_name: llmops-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"
    restart: unless-stopped

volumes:
  postgres_data:
